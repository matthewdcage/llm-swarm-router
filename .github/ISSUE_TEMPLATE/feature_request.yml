name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are trying to solve. For large features, maintainers may ask you to discuss in the issue before opening a PR.
        See [CONTRIBUTING.md](https://github.com/matthewdcage/llm-swarm-router/blob/main/CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point does this address? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Discovery / backends
        - Routing / load balancing
        - LAN swarm / mDNS
        - OpenAI API compatibility
        - Anthropic API compatibility
        - CLI
        - macOS menubar app
        - Linux packaging
        - Windows packaging
        - Documentation
        - Agent skills / editor integration
        - Other
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: Platforms affected
      options:
        - label: macOS
        - label: Linux
        - label: Windows
        - label: All platforms

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this (after discussion if needed)
