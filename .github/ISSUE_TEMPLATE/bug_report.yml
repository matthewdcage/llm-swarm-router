name: Bug report
description: Something is broken or not working as documented
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Search [existing issues](https://github.com/matthewdcage/llm-swarm-router/issues) first.
        For security issues, use [SECURITY.md](https://github.com/matthewdcage/llm-swarm-router/blob/main/SECURITY.md) — do not file here.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (menubar app)
        - macOS (CLI / source)
        - Linux
        - Windows
        - Other / multiple
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: netllm version
      description: Release tag, `./netllm --version`, or git commit SHA
      placeholder: "0.2.1 or abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, config changes, or UI steps
      placeholder: |
        1. ./netllm serve
        2. ...
        3. See error
    validations:
      required: true

  - type: checkboxes
    id: backends
    attributes:
      label: Local backends in use (if any)
      options:
        - label: oMLX
        - label: Ollama
        - label: LM Studio
        - label: vLLM
        - label: None / agent only

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics output
      description: Paste output of `./netllm doctor` and `./netllm status` (redact secrets)
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I redacted API keys, tokens, and private IPs where appropriate
          required: true
