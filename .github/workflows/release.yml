name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv pip install venvstacks
      - run: apps/netllm-mac/Scripts/build.sh release
        env:
          REBUILD_DONOR: force
      - run: bash packaging/scripts/create-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-mac-dmg
          path: dist/llm-swarm-router.dmg
      - name: Attach DMG to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/llm-swarm-router.dmg

  update-homebrew-formula:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump Formula/netllm.rb for release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash packaging/scripts/update-homebrew-formula.sh "$RELEASE_TAG"
      - name: Commit formula bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/netllm.rb
          git diff --staged --quiet && echo "Formula already up to date" && exit 0
          git commit -m "chore(homebrew): bump formula to ${RELEASE_TAG}"
          git push
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
