name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 0.2.2.1); defaults to pyproject.toml
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      netllm_version: ${{ steps.version.outputs.netllm_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            ver="${{ github.event.release.tag_name }}"
            ver="${ver#v}"
            pre="${{ github.event.release.prerelease }}"
          elif [ -n "${{ inputs.version }}" ]; then
            ver="${{ inputs.version }}"
            ver="${ver#v}"
            pre="false"
          else
            ver="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
            pre="false"
          fi
          pyproject="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$ver" != "$pyproject" ]; then
            echo "Release tag v$ver does not match pyproject.toml version $pyproject" >&2
            exit 1
          fi
          echo "netllm_version=$ver" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$pre" >> "$GITHUB_OUTPUT"
          echo "Building netllm version $ver (prerelease=$pre)"

  build-macos:
    needs: resolve-version
    runs-on: macos-14
    env:
      NETLLM_VERSION: ${{ needs.resolve-version.outputs.netllm_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv pip install venvstacks
      - run: apps/netllm-mac/Scripts/build.sh release
        env:
          REBUILD_DONOR: force
          NETLLM_VERSION: ${{ env.NETLLM_VERSION }}
      - name: Install menubar test dependencies
        run: brew install ripgrep
      - run: bash scripts/test-menubar-e2e.sh
      - run: bash scripts/test-menubar-lifecycle.sh
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash packaging/scripts/import-codesign-cert.sh
      - name: Sign app bundle (Developer ID)
        if: env.CODESIGN_IDENTITY != ''
        run: bash packaging/scripts/codesign-mac-app.sh apps/netllm-mac/build/Stage/llm-swarm-router.app
      - run: bash packaging/scripts/create-dmg.sh
      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash packaging/scripts/maybe-notarize-dmg.sh dist/llm-swarm-router.dmg
      - run: chmod +x packaging/scripts/write-sha256-sidecar.sh
      - run: |
          packaging/scripts/write-sha256-sidecar.sh dist/llm-swarm-router.dmg | tee dist/SHA256SUMS
      - run: |
          ver="$(defaults read "$PWD/apps/netllm-mac/build/Stage/llm-swarm-router.app/Contents/Info" CFBundleShortVersionString)"
          test "$ver" = "$NETLLM_VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-mac-dmg
          path: |
            dist/llm-swarm-router.dmg
            dist/llm-swarm-router.dmg.sha256
            dist/SHA256SUMS
      - name: Attach DMG and checksums to release
        if: github.event_name == 'release' && needs.resolve-version.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/llm-swarm-router.dmg
            dist/llm-swarm-router.dmg.sha256

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      NETLLM_VERSION: ${{ needs.resolve-version.outputs.netllm_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm
      - run: chmod +x packaging/linux/build-deb.sh packaging/linux/build-rpm.sh packaging/scripts/write-sha256-sidecar.sh
      - run: NETLLM_VERSION="$NETLLM_VERSION" packaging/linux/build-deb.sh
      - run: NETLLM_VERSION="$NETLLM_VERSION" packaging/linux/build-rpm.sh
      - run: |
          packaging/scripts/write-sha256-sidecar.sh dist/*.deb dist/*.rpm | tee dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-linux-packages
          path: |
            dist/*.deb
            dist/*.deb.sha256
            dist/*.rpm
            dist/*.rpm.sha256
            dist/SHA256SUMS
      - name: Attach Linux packages to release
        if: github.event_name == 'release' && needs.resolve-version.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.deb.sha256
            dist/*.rpm
            dist/*.rpm.sha256

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    env:
      NETLLM_VERSION: ${{ needs.resolve-version.outputs.netllm_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - shell: pwsh
        run: ./packaging/windows/build-zip.ps1 -Version $env:NETLLM_VERSION
      - shell: pwsh
        run: |
          $zip = Get-ChildItem dist/netllm-*-windows-x64.zip | Select-Object -First 1
          ./packaging/scripts/update-winget-manifest.ps1 -Version $env:NETLLM_VERSION -ZipPath $zip.FullName
          $hash = (Get-FileHash -Path $zip.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($zip.Name)" | Out-File -Encoding utf8 "dist/$($zip.Name).sha256"
          "$hash  $($zip.Name)" | Out-File -Encoding utf8 dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-windows-zip
          path: |
            dist/netllm-*-windows-x64.zip
            dist/netllm-*.zip.sha256
            dist/SHA256SUMS
            packaging/windows/winget/netllm.yaml
      - name: Attach Windows zip and winget manifest to release
        if: github.event_name == 'release' && needs.resolve-version.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/netllm-*-windows-x64.zip
            dist/netllm-*-windows-x64.zip.sha256
            packaging/windows/winget/netllm.yaml

  update-homebrew-formula:
    needs: resolve-version
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && needs.resolve-version.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump Formula/netllm.rb for release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash packaging/scripts/update-homebrew-formula.sh "$RELEASE_TAG"
      - name: Open formula bump PR
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="homebrew/${RELEASE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/netllm.rb
          if git diff --staged --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "chore(homebrew): bump formula to ${RELEASE_TAG}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(homebrew): bump formula to ${RELEASE_TAG}" \
            --body "Automated Homebrew formula bump for ${RELEASE_TAG}. Merge to update the tap."
