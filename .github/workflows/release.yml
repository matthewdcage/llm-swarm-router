name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 0.2.2); defaults to pyproject.toml
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      netllm_version: ${{ steps.version.outputs.netllm_version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            ver="${{ github.event.release.tag_name }}"
            ver="${ver#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            ver="${{ inputs.version }}"
            ver="${ver#v}"
          else
            ver="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          fi
          echo "netllm_version=$ver" >> "$GITHUB_OUTPUT"
          echo "Building netllm version $ver"

  build-macos:
    needs: resolve-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv pip install venvstacks
      - run: apps/netllm-mac/Scripts/build.sh release
        env:
          REBUILD_DONOR: force
      - run: bash packaging/scripts/create-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-mac-dmg
          path: dist/llm-swarm-router.dmg
      - name: Attach DMG to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/llm-swarm-router.dmg

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      NETLLM_VERSION: ${{ needs.resolve-version.outputs.netllm_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm
      - run: chmod +x packaging/linux/build-deb.sh packaging/linux/build-rpm.sh
      - run: NETLLM_VERSION="$NETLLM_VERSION" packaging/linux/build-deb.sh
      - name: Attach deb to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
      - run: NETLLM_VERSION="$NETLLM_VERSION" packaging/linux/build-rpm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
      - name: Attach Linux packages to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    env:
      NETLLM_VERSION: ${{ needs.resolve-version.outputs.netllm_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - shell: pwsh
        run: ./packaging/windows/build-zip.ps1 -Version $env:NETLLM_VERSION
      - shell: pwsh
        run: |
          $zip = Get-ChildItem dist/netllm-*-windows-x64.zip | Select-Object -First 1
          ./packaging/scripts/update-winget-manifest.ps1 -Version $env:NETLLM_VERSION -ZipPath $zip.FullName
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-windows-zip
          path: |
            dist/netllm-*-windows-x64.zip
            packaging/windows/winget/netllm.yaml
      - name: Attach Windows zip and winget manifest to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/netllm-*-windows-x64.zip
            packaging/windows/winget/netllm.yaml

  update-homebrew-formula:
    needs: resolve-version
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump Formula/netllm.rb for release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash packaging/scripts/update-homebrew-formula.sh "$RELEASE_TAG"
      - name: Open formula bump PR
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="homebrew/${RELEASE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/netllm.rb
          if git diff --staged --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "chore(homebrew): bump formula to ${RELEASE_TAG}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(homebrew): bump formula to ${RELEASE_TAG}" \
            --body "Automated Homebrew formula bump for ${RELEASE_TAG}. Merge to update the tap."
