name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: bash scripts/ci.sh lint
        shell: bash

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Test
        run: bash scripts/ci.sh test
        shell: bash

  sdk:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: SDK contract tests
        run: bash scripts/ci.sh sdk
        shell: bash

  menubar-lifecycle:
    needs: lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv pip install venvstacks
      - run: apps/netllm-mac/Scripts/build.sh release
        env:
          REBUILD_DONOR: force
      - name: Install menubar test dependencies
        run: brew install ripgrep
      - run: bash scripts/test-menubar-e2e.sh
      - run: bash scripts/test-menubar-lifecycle.sh

  packaging-smoke:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: netllm-linux-packages
            artifact_path: |
              dist/*.deb
              dist/*.rpm
          - os: windows-latest
            artifact: netllm-windows-zip
            artifact_path: dist/netllm-*-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm rsync
      - name: Packaging smoke
        run: |
          ver="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          export NETLLM_VERSION="${ver}.ci"
          bash scripts/ci.sh packaging
        shell: bash
      - name: Verify zip contents
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist/netllm-*-windows-x64.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath dist/zip-check -Force
          @('netllm.cmd', 'install-service.ps1') | ForEach-Object {
            if (-not (Test-Path "dist/zip-check/$_")) { throw "missing $_ in zip" }
          }
          if (-not (Test-Path dist/zip-check/Scripts/netllm.exe)) {
            throw 'missing Scripts/netllm.exe in zip'
          }
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
