name: Release Windows

on:
  push:
    tags:
      - "v*"

jobs:
  zip:
    runs-on: windows-latest
    env:
      NETLLM_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build portable zip
        shell: pwsh
        run: |
          $version = $env:NETLLM_VERSION.TrimStart('v')
          ./packaging/windows/build-zip.ps1 -Version $version
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-windows-zip
          path: dist/netllm-*-windows-x64.zip
