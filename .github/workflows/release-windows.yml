# Deprecated: use .github/workflows/release.yml (unified release on publish).
name: Release Windows (manual only)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  zip:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
      - shell: pwsh
        run: ./packaging/windows/build-zip.ps1 -Version 0.0.0-dev
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-windows-zip
          path: dist/netllm-*-windows-x64.zip
