# Deprecated: use .github/workflows/release.yml (unified release on publish).
name: Release Linux (manual only)

on:
  workflow_dispatch:

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm
      - run: chmod +x packaging/linux/build-deb.sh packaging/linux/build-rpm.sh
      - run: NETLLM_VERSION=0.0.0-dev packaging/linux/build-deb.sh
      - run: NETLLM_VERSION=0.0.0-dev packaging/linux/build-rpm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
