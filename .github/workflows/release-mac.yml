# Deprecated: use .github/workflows/release.yml (unified release on publish).
name: Release macOS app (manual only)

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv pip install venvstacks
      - run: apps/netllm-mac/Scripts/build.sh release
        env:
          REBUILD_DONOR: force
      - run: bash packaging/scripts/create-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: netllm-mac-dmg
          path: dist/llm-swarm-router.dmg
