# Example netllm configuration
# Copy to ~/.config/netllm/config.toml or run `netllm init`

[agent]
listen = "127.0.0.1:11400"
role = "peer"
advertise = true

[discovery]
providers = ["omlx", "ollama", "lmstudio", "vllm"]
custom_endpoints = []
# Per-machine overrides (tried before default port scan). Example Mac mini oMLX on 8088:
# [discovery.provider_urls]
# omlx = ["http://127.0.0.1:8088/v1"]
# ollama = ["http://127.0.0.1:11434/v1"]

[swarm]
peers = []
mdns = true
subnet_scan = false
subnet_cidrs = []
cluster_token = ""
heartbeat_interval_s = 10.0

[routing]
default_strategy = "local_first"
allow_remote = true
require_same_model_for_shard = true

# Optional menubar app settings (defaults apply when section is omitted)
[ui]
auto_start_on_launch = true
# log_dir = ""  # default: platform-specific (see netllm_core.platform.default_log_dir)

# Optional manual backend overrides (per-endpoint API keys via env)
# [[routing.backends]]
# base_url = "http://192.168.1.50:8080/v1"
# provider = "omlx"
# api_key_env = "OMLX_API_KEY"
# enabled = true
# local = true

# Anthropic cloud failover for native Messages API clients (Claude Code, etc.)
# [[routing.backends]]
# base_url = "https://api.anthropic.com"
# provider = "anthropic"
# api_format = "anthropic"
# api_key_env = "ANTHROPIC_API_KEY"
# enabled = true
# local = false
