# Example netllm configuration
# Copy to ~/.config/netllm/config.toml or run `netllm init`

[agent]
listen = "127.0.0.1:11400"
role = "peer"
advertise = true
# agent_id and hostname are generated on first save; agent_id is this
# node's swarm identity (used for peer dedupe and join validation).
# agent_id = "a1b2c3d4"
# hostname = "my-mac"

[discovery]
# macOS default (netllm init): omlx, ollama, lmstudio, vllm
# Linux/Windows default (netllm init): ollama, lmstudio, vllm (no omlx)
providers = ["omlx", "ollama", "lmstudio", "vllm"]
custom_endpoints = []
# Per-machine overrides (tried before default port scan). Example desktop node with oMLX on 8088:
# [discovery.provider_urls]
# omlx = ["http://127.0.0.1:8088/v1"]
# ollama = ["http://127.0.0.1:11434/v1"]

[swarm]
peers = []
mdns = true
subnet_scan = false
subnet_cidrs = []
cluster_token = ""
# With a cluster_token set, also require it on /v1/* inference routes
# from non-local clients (peers forward with the token automatically).
require_token_for_inference = false
heartbeat_interval_s = 10.0
# Drop a peer after this long without a heartbeat...
peer_stale_after_s = 45.0
# ...and periodically re-probe previously seen peers (and re-scan the
# subnet when subnet_scan is on) so peers lost to sleep/Wi-Fi blips
# rejoin automatically. 0 disables re-discovery.
rediscover_interval_s = 60.0

[routing]
# auto: shard-context requests use batch_shard, everything else balances
#       by live in-flight load (recommended for mixed interactive traffic).
# local_first: single machine. round_robin: spread same model across LAN peer agents.
# local_spillover: serve locally while idle, spill to least-loaded peer when busy.
default_strategy = "local_first"
allow_remote = true
# Deprecated (kept for config compatibility; see routing-hardening-plan.md).
require_same_model_for_shard = true
# Back-pressure cap applied by every strategy: selection prefers backends
# with fewer than this many requests in flight. 0 disables.
max_in_flight_per_backend = 0
# local_spillover only: serve locally while fewer than this many requests
# are in flight locally; at or above it, spill to a LAN peer only when
# that peer is strictly less loaded. Sequential (one-at-a-time) traffic
# therefore always stays local — use round_robin / least_load to spread
# light traffic across peers.
spillover_max_local_in_flight = 2
# Health cache: probe freshness window, faster re-probe for offline
# backends, and consecutive failures before a backend is marked offline.
health_ttl_s = 30.0
offline_retry_s = 10.0
max_backend_failures = 3

# Per-request overrides (any client, no config change needed):
#   x-netllm-strategy: round_robin        # one-off strategy override
#   x-netllm-backend: peer:<agent-id>     # pin to a peer / backend id / URL
#   x-netllm-local-only: 1                # never leave this machine

# Mixed-provider fleets: map one canonical name to per-provider model IDs
# so the same weights spread across oMLX / Ollama / LM Studio / vLLM.
# [routing.model_aliases]
# "llama3" = ["llama3:8b-instruct-q4_K_M", "Meta-Llama-3-8B-Instruct-GGUF"]

# Optional routing policies (first match wins). Cloud paths require allow_cloud = true.
# [[routing.policies]]
# name = "local-openai"
# api_format = "openai"
# strategy = "local_first"
# allow_cloud = false
#
# [[routing.policies]]
# name = "cloud-openai-gpt"
# model_prefix = "gpt-"
# api_format = "openai"
# allow_cloud = true
# strategy = "failover"

# Shared UI settings (macOS menubar + all platforms via /ui/ dashboard)
[ui]
auto_start_on_launch = true
check_for_updates_automatically = true
# log_dir = ""  # default: ~/Library/.../logs (macOS), XDG state (Linux), %LOCALAPPDATA% (Windows)
# serve writes agent.log under log_dir on all platforms

# Optional manual backend overrides (per-endpoint API keys via env)
# [[routing.backends]]
# base_url = "http://192.168.1.50:8080/v1"
# provider = "omlx"
# api_key_env = "OMLX_API_KEY"
# enabled = true
# local = true

# LM Studio with API authentication enabled (Settings -> Developer):
# set LMSTUDIO_API_KEY in the agent's environment, or pin the token here.
# [[routing.backends]]
# base_url = "http://127.0.0.1:1234/v1"
# provider = "lmstudio"
# api_key_env = "LMSTUDIO_API_KEY"
# enabled = true
# local = true

# Anthropic cloud failover for native Messages API clients (Claude Code, etc.)
# [[routing.backends]]
# base_url = "https://api.anthropic.com"
# provider = "anthropic"
# api_format = "anthropic"
# api_key_env = "ANTHROPIC_API_KEY"
# enabled = true
# local = false
