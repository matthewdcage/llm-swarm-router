[project]
name = "netllm-sdk-openai"
version = "0.2.0"
description = "OpenAI SDK adapter for netllm upstream calls"
requires-python = ">=3.11"
dependencies = [
    "openai>=1.60",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/netllm_sdk_openai"]
