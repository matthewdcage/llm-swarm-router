[project]
name = "netllm-discovery"
version = "0.3.0.0"
description = "Local and swarm discovery for netllm agents"
requires-python = ">=3.11"
dependencies = [
    "netllm-core",
    "httpx>=0.28",
    "zeroconf>=0.132",
]

[project.optional-dependencies]
# Kept for backwards compatibility; zeroconf is now a core dependency.
mdns = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/netllm_discovery"]

[tool.uv.sources]
netllm-core = { workspace = true }
