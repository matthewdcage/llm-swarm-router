<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llm-swarm-router — dashboard</title>
  <link rel="icon" href="logo-light.png" type="image/png" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="logo-dark.png" type="image/png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="logo-light.png" type="image/png" />
  <link rel="stylesheet" href="dashboard-tokens.css?v=0.4.3.0" />
  <link rel="stylesheet" href="dashboard.css?v=0.4.3.0" />
</head>
<body>
  <div class="app">
    <nav class="sidebar" aria-label="Dashboard navigation">
      <div class="sidebar-brand">
        <picture class="brand-logo">
          <source srcset="logo-dark.png" media="(prefers-color-scheme: dark)" />
          <img src="logo-light.png" alt="" width="32" height="32" />
        </picture>
        <div>
          <strong>llm-swarm-router</strong>
          <span>Mesh router for local LLM backends</span>
        </div>
      </div>
      <div class="nav-group-label">Server</div>
      <button type="button" class="nav-item active" data-tab="status">Status</button>
      <button type="button" class="nav-item" data-tab="backends">Backends</button>
      <button type="button" class="nav-item" data-tab="models">Models</button>
      <button type="button" class="nav-item" data-tab="peers">Peers</button>
      <div class="nav-group-label">Config</div>
      <button type="button" class="nav-item" data-tab="agent">Agent</button>
      <button type="button" class="nav-item" data-tab="discovery">Servers</button>
      <button type="button" class="nav-item" data-tab="swarm">Swarm</button>
      <button type="button" class="nav-item" data-tab="routing">Routing</button>
      <button type="button" class="nav-item" data-tab="cloud">Cloud</button>
      <button type="button" class="nav-item" data-tab="ui">UI</button>
      <div class="nav-group-label">Tools</div>
      <button type="button" class="nav-item" data-tab="logs">Logs</button>
      <button type="button" class="nav-item" data-tab="tools">Doctor &amp; Test</button>
    </nav>

    <div class="main">
      <header class="topbar">
        <div class="topbar-status">
          <picture class="brand-logo topbar-logo">
            <source srcset="logo-dark.png" media="(prefers-color-scheme: dark)" />
            <img src="logo-light.png" alt="" width="28" height="28" />
          </picture>
          <div>
            <div class="topbar-title">llm-swarm-router</div>
            <div class="topbar-meta">
              <span id="status-badge" class="badge warn"><span class="dot"></span>Checking…</span>
              <span id="agent-status-line" class="sub">Loading…</span>
            </div>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" id="btn-discover">Discover</button>
          <button type="button" class="secondary" id="btn-env">Copy client env</button>
          <a class="btn secondary" id="btn-status-json" href="/" target="_blank" rel="noopener">Status JSON</a>
          <a class="btn secondary" id="btn-omlx-admin" href="http://127.0.0.1:8080/admin" target="_blank" rel="noopener">oMLX Admin</a>
          <button type="button" class="secondary" id="btn-refresh">Refresh</button>
          <button type="button" id="btn-save" disabled>Save</button>
        </div>
      </header>

      <div id="global-banner" hidden></div>

      <main class="content">
        <section id="tab-status" class="tab-panel active" aria-label="Status"></section>
        <section id="tab-backends" class="tab-panel" aria-label="Backends"></section>
        <section id="tab-models" class="tab-panel" aria-label="Models"></section>
        <section id="tab-peers" class="tab-panel" aria-label="Peers"></section>
        <section id="tab-agent" class="tab-panel" aria-label="Agent config"></section>
        <section id="tab-discovery" class="tab-panel" aria-label="Discovery config"></section>
        <section id="tab-swarm" class="tab-panel" aria-label="Swarm config"></section>
        <section id="tab-routing" class="tab-panel" aria-label="Routing config"></section>
        <section id="tab-cloud" class="tab-panel" aria-label="Cloud config"></section>
        <section id="tab-ui" class="tab-panel" aria-label="UI config"></section>
        <section id="tab-logs" class="tab-panel" aria-label="Agent logs"></section>
        <section id="tab-tools" class="tab-panel" aria-label="Doctor and tools"></section>
      </main>
    </div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="dashboard.js?v=0.4.3.0"></script>
</body>
</html>
