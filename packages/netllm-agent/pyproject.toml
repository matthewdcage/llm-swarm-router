[project]
name = "netllm-agent"
version = "0.2.3.2"
description = "FastAPI agent daemon for netllm swarm routing"
requires-python = ">=3.11"
dependencies = [
    "netllm-core",
    "netllm-sdk-openai",
    "netllm-sdk-anthropic",
    "netllm-discovery",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "prometheus-client>=0.21",
    "httpx>=0.28",
]

[project.optional-dependencies]
mdns = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/netllm_agent"]

[tool.uv.sources]
netllm-core = { workspace = true }
netllm-sdk-openai = { workspace = true }
netllm-sdk-anthropic = { workspace = true }
netllm-discovery = { workspace = true }
