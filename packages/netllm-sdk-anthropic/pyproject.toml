[project]
name = "netllm-sdk-anthropic"
version = "0.2.2"
description = "Anthropic SDK adapter for netllm upstream calls"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.45",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/netllm_sdk_anthropic"]
