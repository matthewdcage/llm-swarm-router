[project]
name = "netllm-cli"
version = "0.2.3"
description = "CLI for netllm network LLM router"
requires-python = ">=3.11"
dependencies = [
    "netllm-core",
    "netllm-discovery",
    "netllm-agent",
    "typer>=0.15",
    "rich>=13.9",
    "httpx>=0.28",
]

[project.scripts]
netllm = "netllm_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/netllm_cli"]

[tool.uv.sources]
netllm-core = { workspace = true }
netllm-discovery = { workspace = true }
netllm-agent = { workspace = true }
